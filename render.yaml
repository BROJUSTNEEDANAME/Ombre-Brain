services:
  - type: web
    name: ombre-brain
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run_all.py
    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http
      - key: OMBRE_API_KEY
        sync: false          # Set in Render dashboard > Environment (any OpenAI-compatible key)
      - key: OMBRE_BASE_URL
        sync: false          # e.g. https://api.deepseek.com/v1 or https://api.siliconflow.cn/v1
      - key: OMBRE_BUCKETS_DIR
        value: /opt/render/project/src/buckets
      # --- Telegram bot（与大脑同一个服务里一起跑，run_all.py 拉起）---
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # @BotFather 给的 bot token
      - key: ANTHROPIC_API_KEY
        sync: false          # Claude API key（连 Opus 4.6）
      - key: ALLOWED_CHAT_IDS
        sync: false          # 你的 Telegram chat id；部署后给 bot 发 /id 拿到再填
      - key: OMBRE_BOT_MODEL
        value: claude-opus-4-6
      - key: OMBRE_MCP_URL
        value: https://ombre-brain-6e05.onrender.com/mcp
    disk:
      name: ombre-buckets
      mountPath: /opt/render/project/src/buckets
      sizeGB: 1
