services:
  - type: web
    name: ombre-brain
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http
      - key: OMBRE_API_KEY
        sync: false          # Set in Render dashboard > Environment (any OpenAI-compatible key)
      - key: OMBRE_BASE_URL
        sync: false          # e.g. https://api.deepseek.com/v1 or https://api.siliconflow.cn/v1
      - key: OMBRE_BUCKETS_DIR
        value: /opt/render/project/src/buckets
    disk:
      name: ombre-buckets
      mountPath: /opt/render/project/src/buckets
      sizeGB: 1

  # Telegram bot —— 把 Nikto 接到手机上，秒回，挂同一颗大脑
  - type: worker
    name: ombre-telegram-bot
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements-telegram.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # 找 @BotFather 要
      - key: ANTHROPIC_API_KEY
        sync: false          # Claude API key
      - key: ALLOWED_CHAT_IDS
        sync: false          # 你自己的 Telegram chat id（逗号分隔，强烈建议设）
      - key: OMBRE_BOT_MODEL
        value: claude-opus-4-6
      - key: OMBRE_MCP_URL
        value: https://ombre-brain-6e05.onrender.com/mcp
