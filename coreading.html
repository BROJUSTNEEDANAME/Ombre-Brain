<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>和 Nikto 共读</title>
  <style>
    :root{--paper:#f3ede1;--ink:#2d2922;--muted:#81786a;--line:#d9cebd;--wine:#7f2e34;--wine2:#a7474d;--jade:#317767;--amber:#b86f2f;--card:rgba(255,252,245,.92);--safe:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 15% 0,#fff9ed 0,transparent 38%),linear-gradient(180deg,#e9dec9,#f6f0e6 28%,#eee5d7);color:var(--ink);font-family:"Songti SC","Noto Serif SC",Georgia,serif;min-height:100vh}
    button,input{font:inherit}.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top,0px)) 14px 10px;background:rgba(244,237,225,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
    .back,.chat-open{border:0;background:transparent;color:var(--wine);font-size:15px;padding:7px}.headcopy{flex:1;min-width:0}.work{font-size:11px;letter-spacing:.08em;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chapter{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat-open{border:1px solid #cda9a7;border-radius:18px;padding:7px 12px;background:#fff8f4}
    .import{margin:18px auto;max-width:720px;padding:18px}.import-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 12px 34px rgba(73,52,36,.09)}.import h1{margin:0 0 7px;font-size:25px}.import p{margin:0 0 15px;color:var(--muted);font-size:13px;line-height:1.6}.urlrow{display:flex;gap:8px}.urlrow input{min-width:0;flex:1;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fffdf8;color:var(--ink)}.primary{border:0;border-radius:14px;padding:0 16px;background:linear-gradient(145deg,var(--wine2),var(--wine));color:#fff;box-shadow:0 8px 18px rgba(127,46,52,.2)}.status{font-size:12px;color:var(--muted);margin-top:10px;min-height:18px}
    main{display:none;max-width:720px;margin:0 auto;padding:12px 22px 180px}.source{font-size:11px;color:var(--muted);margin:8px 0 24px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.para{position:relative;font-size:19px;line-height:1.95;letter-spacing:.02em;margin:0 0 1.2em;padding:2px 0;scroll-margin-top:90px}.para.current:before{content:"";position:absolute;left:-13px;top:.65em;width:3px;height:1.6em;border-radius:3px;background:var(--wine2)}.para.has-shan{background:linear-gradient(transparent 68%,rgba(49,119,103,.2) 68%)}.para.has-nikto{box-shadow:inset 3px 0 rgba(184,111,47,.5);padding-left:10px}.notes{margin:-.6em 0 1.4em;display:flex;flex-wrap:wrap;gap:6px}.note{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;font-size:12px;border-radius:12px;padding:6px 9px;max-width:100%;white-space:pre-wrap}.note.shan{background:rgba(49,119,103,.12);color:#205c50}.note.nikto{background:rgba(184,111,47,.13);color:#7c451d}.endnav{border-top:1px solid var(--line);padding:24px 0;text-align:center}.next{border:1px solid #cda9a7;color:var(--wine);background:#fff8f4;border-radius:16px;padding:12px 18px}
    .selectbar{position:fixed;z-index:45;left:50%;bottom:calc(74px + var(--safe));transform:translateX(-50%);display:none;gap:7px;background:#2e2823;color:#fff;padding:8px;border-radius:16px;box-shadow:0 12px 34px rgba(0,0,0,.26);white-space:nowrap}.selectbar.show{display:flex}.selectbar button{border:0;border-radius:11px;padding:9px 11px;color:#fff;background:#4a4038}.selectbar .ask{background:var(--wine2)}
    .drawer{position:fixed;z-index:40;left:0;right:0;bottom:0;transform:translateY(calc(100% - 66px - var(--safe)));height:min(72vh,650px);background:#f8f1e7;border-radius:24px 24px 0 0;border:1px solid var(--line);box-shadow:0 -14px 38px rgba(50,34,26,.18);transition:transform .28s ease;display:flex;flex-direction:column;padding-bottom:var(--safe)}.drawer.open{transform:translateY(0)}.grab{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);cursor:pointer}.grab strong{font-size:15px}.grab span{font-size:12px;color:var(--muted)}.chatlog{flex:1;overflow:auto;padding:14px 14px 8px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}.msg{max-width:84%;padding:10px 12px;border-radius:16px;margin:7px 0;line-height:1.55;font-size:14px;white-space:pre-wrap}.msg.me{margin-left:auto;background:var(--wine2);color:#fff;border-bottom-right-radius:5px}.msg.you{background:#eee3d4;border:1px solid var(--line);border-bottom-left-radius:5px}.compose{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:#f8f1e7}.compose input{min-width:0;flex:1;border:1px solid var(--line);border-radius:16px;padding:11px 13px;background:#fffdf8}.compose button{width:44px;border:0;border-radius:15px;background:var(--wine);color:#fff}.toggle{display:flex;align-items:center;gap:7px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;font-size:12px;color:var(--muted);padding:7px 18px 0}.toggle input{accent-color:var(--wine)}
    .busy:after{content:"";display:inline-block;width:11px;height:11px;border:2px solid #d7b8b5;border-top-color:var(--wine);border-radius:50%;animation:spin .7s linear infinite;margin-left:7px}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:520px){.import{padding:12px;margin-top:8px}.urlrow{flex-direction:column}.primary{height:44px}main{padding-left:20px;padding-right:20px}.para{font-size:18px;line-height:1.9}.chat-open{font-size:13px}}
  </style>
</head>
<body>
  <header class="top"><button class="back" id="back">‹ 小家</button><div class="headcopy"><div class="work" id="work">和 Nikto 共读</div><div class="chapter" id="chapter">贴一章进来</div></div><button class="chat-open" id="chatOpen">和他说</button></header>
  <section class="import" id="importBox"><div class="import-card"><h1>把这一章带回来</h1><p>粘贴公开章节链接。系统会清掉广告，只留下正文；遇到登录、付费墙或验证码会停下，不会绕过。</p><div class="urlrow"><input id="url" type="url" inputmode="url" autocomplete="url" placeholder="https://…"><button class="primary" id="importBtn">开始共读</button></div><div class="status" id="status"></div><details style="margin-top:12px;color:var(--muted);font-size:12px;line-height:1.65"><summary>设置 iPhone 分享到共读</summary><div style="padding-top:8px">在“快捷指令”新建快捷指令，接收“URL”和“网页”，加入“URL”动作，内容填下方地址后接快捷指令输入，再加入“打开 URL”。</div><button id="copyShortcut" style="margin-top:8px;border:1px solid var(--line);border-radius:10px;background:#fffdf8;padding:7px 10px;color:var(--wine)">复制这个共读入口</button></details></div></section>
  <main id="reader"><div class="source" id="source"></div><article id="text"></article><div class="endnav"><button class="next" id="nextBtn" hidden>读下一章</button></div></main>
  <div class="selectbar" id="selectbar"><button id="commentBtn">写批注</button><button id="onlyMark">只划线</button><button class="ask" id="markAsk">划线，问他</button></div>
  <aside class="drawer" id="drawer"><div class="grab" id="grab"><strong>Nikto 在这</strong><span id="chatHint">上拉聊天</span></div><div class="chatlog" id="chatlog"></div><div class="compose"><input id="chatInput" maxlength="2000" placeholder="边读边跟他说…"><button id="send">↑</button></div></aside>
<script>
  window.OMBRE_TOKEN=__OMBRE_WEB_TOKEN_JSON__;
  const $=id=>document.getElementById(id), token=window.OMBRE_TOKEN||'';
  let chapter=null,currentPara='',selectedText='',selectedPara='',drawerOpen=false,chatBusy=false;
  const uuid=()=>window.crypto&&crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);
  const api=async(path,options={})=>{const res=await fetch(path,options);let data={};try{data=await res.json()}catch(e){}if(!res.ok)throw new Error(data.error||('请求失败 '+res.status));return data};
  $('back').onclick=()=>location.href='home';
  $('copyShortcut').onclick=async()=>{const base=location.href.split('?')[0]+'?url=';try{await navigator.clipboard.writeText(base);setStatus('入口已复制。快捷指令里把“快捷指令输入”接在它后面。')}catch(e){setStatus(base)}};
  $('chatOpen').onclick=()=>setDrawer(true); $('grab').onclick=()=>setDrawer(!drawerOpen);
  function setDrawer(open){drawerOpen=open;$('drawer').classList.toggle('open',open);$('chatHint').textContent=open?'下拉收起':'上拉聊天';if(open)loadChat()}
  function setStatus(text,busy=false){$('status').textContent=text||'';$('status').classList.toggle('busy',busy)}
  async function importUrl(value){const url=(value||$('url').value).trim();if(!url)return;setStatus('在清理广告、辨认正文',true);$('importBtn').disabled=true;try{const d=await api('api/coreading/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,url})});renderChapter(d.chapter);setStatus(d.cached?'已经读过这一章，从上次位置继续。':'正文已经收好了，Nikto 会在后台安静预读。')}catch(e){setStatus(e.message)}finally{$('importBtn').disabled=false;$('status').classList.remove('busy')}}
  $('importBtn').onclick=()=>importUrl(); $('url').addEventListener('keydown',e=>{if(e.key==='Enter')importUrl()});
  function renderChapter(data){chapter=data;$('importBox').style.display='none';$('reader').style.display='block';$('work').textContent=data.work_title||'共读';$('chapter').textContent=data.title||'这一章';$('source').textContent=data.source_url||'';const ann=data.annotations||[],root=$('text');root.innerHTML='';(data.paragraphs||[]).forEach(p=>{const wrap=document.createElement('section');const el=document.createElement('p');el.className='para';el.dataset.pid=p.id;el.textContent=p.text;const mine=ann.filter(a=>a.paragraph_id===p.id);if(mine.some(a=>a.author==='闪闪'&&a.kind==='highlight'))el.classList.add('has-shan');if(mine.some(a=>a.author==='Nikto'&&a.kind==='highlight'))el.classList.add('has-nikto');wrap.appendChild(el);if(mine.length){const notes=document.createElement('div');notes.className='notes';mine.filter(a=>a.kind==='comment').forEach(a=>{const n=document.createElement('div');n.className='note '+(a.author==='Nikto'?'nikto':'shan');n.textContent=a.author+'：'+a.text;notes.appendChild(n)});wrap.appendChild(notes)}root.appendChild(wrap)});$('nextBtn').hidden=!data.next_url;$('nextBtn').onclick=()=>{if(confirm('读完这一章了。要进入下一章吗？'))importUrl(data.next_url)};observeParagraphs();const resume=(data.progress||{}).paragraph_id;if(resume)setTimeout(()=>document.querySelector('[data-pid="'+resume+'"]')?.scrollIntoView({block:'center'}),80)}
  async function resume(){try{const st=await api('api/coreading/state');if(st.active){const d=await api('api/coreading/chapter/'+encodeURIComponent(st.chapter_id));renderChapter(d.chapter)}else $('importBox').style.display='block'}catch(e){setStatus('共读状态暂时读不到，普通聊天不受影响。')}}
  let progressTimer=null,paragraphObserver=null;
  function observeParagraphs(){if(paragraphObserver)paragraphObserver.disconnect();paragraphObserver=new IntersectionObserver(entries=>{const best=entries.filter(e=>e.isIntersecting).sort((a,b)=>b.intersectionRatio-a.intersectionRatio)[0];if(!best)return;document.querySelectorAll('.para.current').forEach(x=>x.classList.remove('current'));best.target.classList.add('current');currentPara=best.target.dataset.pid;clearTimeout(progressTimer);progressTimer=setTimeout(()=>saveState(currentPara,''),500);claimAnchor(currentPara)},{rootMargin:'-18% 0px -58% 0px',threshold:[.05,.35,.7]});document.querySelectorAll('.para').forEach(p=>paragraphObserver.observe(p))}
  async function saveState(pid,selection){if(!chapter)return;try{await api('api/coreading/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,chapter_id:chapter.id,paragraph_id:pid,selection:selection||''})})}catch(e){}}
  document.addEventListener('selectionchange',()=>{clearTimeout(window._selT);window._selT=setTimeout(()=>{const sel=window.getSelection(),text=(sel&&sel.toString()||'').trim();const node=sel&&sel.anchorNode;const para=node&&(node.nodeType===1?node:node.parentElement)?.closest?.('.para');if(text&&para&&text.length<=1200){selectedText=text;selectedPara=para.dataset.pid;$('selectbar').classList.add('show')}else $('selectbar').classList.remove('show')},120)});
  async function mark(ask){if(!chapter||!selectedText)return;const text=selectedText,pid=selectedPara;$('selectbar').classList.remove('show');try{await saveState(pid,text);await api('api/coreading/annotations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,chapter_id:chapter.id,paragraph_id:pid,text,kind:'highlight'})});document.querySelector('[data-pid="'+pid+'"]')?.classList.add('has-shan');if(ask){setDrawer(true);await sendChat('我划了这句。你跟我说说你读到的东西。')}}catch(e){appendMsg('you','这条划线刚才没存上。')}}
  async function addComment(){if(!chapter||!selectedPara)return;const note=prompt('写在这段旁边：','');if(!note)return;$('selectbar').classList.remove('show');try{await saveState(selectedPara,selectedText);await api('api/coreading/annotations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,chapter_id:chapter.id,paragraph_id:selectedPara,text:note,kind:'comment'})});const d=await api('api/coreading/chapter/'+encodeURIComponent(chapter.id));renderChapter(d.chapter)}catch(e){appendMsg('you','这条批注刚才没存上。')}}
  $('onlyMark').onclick=()=>mark(false);$('markAsk').onclick=()=>mark(true);
  $('commentBtn').onclick=addComment;
  async function claimAnchor(pid){if(!chapter)return;try{const d=await api('api/coreading/anchor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,chapter_id:chapter.id,paragraph_id:pid})});if(d.anchor){await saveState(pid,'');const message='【共读后台事件，不是闪闪说的话】她刚读到 '+pid+'。你预读时注意到：'+d.anchor.hint+'。现在以你平常和她说话的方式，只有确实想说的那一句或两句；不要复述剧情，不要提后台分析。';await askBrain(message,true)}}catch(e){}}
  function appendMsg(side,text){if(!text)return;const d=document.createElement('div');d.className='msg '+side;d.textContent=text;$('chatlog').appendChild(d);$('chatlog').scrollTop=$('chatlog').scrollHeight}
  async function loadChat(){try{const d=await api('api/chat/state?thread=main&token='+encodeURIComponent(window.OMBRE_TOKEN||''));$('chatlog').innerHTML='';(d.log||[]).slice(-24).forEach(m=>appendMsg(m.side==='me'?'me':'you',m.text))}catch(e){}}
  async function askBrain(text,ghost=false){if(chatBusy)return;chatBusy=true;$('send').disabled=true;if(!ghost)appendMsg('me',text);try{const id='coreading:'+uuid(),d=await api('api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:text}],token,thread:'main',source:'coreading',message_id:id,timestamp:new Date().toISOString(),server_history:true,ghost_user:ghost})});(d.segments&&d.segments.length?d.segments:[d.reply]).filter(Boolean).forEach(s=>appendMsg('you',s));if(Array.isArray(d.recorded)&&d.recorded.length)localStorage.setItem('coreadingLastMemory',JSON.stringify(d.recorded))}catch(e){appendMsg('you','这一下没接上，但阅读位置已经留住了。')}finally{chatBusy=false;$('send').disabled=false}}
  async function sendChat(forced){const text=(forced||$('chatInput').value).trim();if(!text)return;$('chatInput').value='';await askBrain(text,false)}
  $('send').onclick=()=>sendChat();$('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendChat()}});
  const shared=new URLSearchParams(location.search).get('url');if(shared){$('url').value=shared;importUrl(shared)}else resume();
</script>
</body>
</html>
